[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

# Solidity / Ylem Compiler-Einstellungen
solc_version = "1.1.1"
use_ylem = "/usr/local/bin/ylem"
optimizer = true
optimizer_runs = 200

# Network ID für XCB Core Coin Blockchain
# Testnet: 3 (Devín), Mainnet: 1
network_id = 3

# Remappings für spark-std
remappings = [
    "spark-std/=lib/spark-std/src/",
    "@cip20/=src/",
]

[profile.ci]
fuzz = { runs = 500 }
invariant = { runs = 256 }

[rpc_endpoints]
# Lokaler Devín Testnet Node
devin = "http://127.0.0.1:8545"
# Mainnet (URL aus Umgebungsvariable)
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
# Block Explorer für Testnet
devin = { key = "noapikey", url = "https://xab.blockindex.net" }
mainnet = { key = "noapikey", url = "https://blockindex.net" }
